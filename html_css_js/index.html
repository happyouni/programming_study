<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HTML Frameset 구조</title>
</head>

<frameset rows="30%, 70%">
    
    <frame src="about:blank" name="topFrame" title="상단 영역">
     
    
    <frame src="content.html" name="mainFrame" title="본문 영역">

    <noframes>
        <body>
            <p>이 브라우저는 프레임을 지원하지 않습니다.</p>
        </body>
    </noframes>

</frameset>
</html>
